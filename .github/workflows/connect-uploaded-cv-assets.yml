name: Connect uploaded CV assets

on:
  push:
    paths:
      - '.github/workflows/connect-uploaded-cv-assets.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-site:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect portrait and PDF files
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          replacement = r'''const fileAssets={
            portrait:"./f58bd69b-a414-46d6-858a-8eb59e659121-1_all_35799.jpg",
            es:"./HV JUAN DAVID ESCOBAR 2026-es.pdf",
            en:"./CV-Juan-David-Escobar-ES.pdf"
          };
          let language="es";
          function hydratePortrait(){
            const image=document.getElementById("portraitImage");
            if(!image)return;
            image.addEventListener("load",()=>image.classList.add("loaded"),{once:true});
            image.addEventListener("error",()=>console.error("Portrait file could not be loaded"),{once:true});
            image.src=encodeURI(fileAssets.portrait);
          }
          function downloadCV(button){
            const source=language==="es"?fileAssets.es:fileAssets.en;
            const link=document.createElement("a");
            link.href=encodeURI(source);
            link.download=language==="es"?"HV-Juan-David-Escobar-2026-ES.pdf":"CV-Juan-David-Escobar-2026-EN.pdf";
            link.rel="noopener";
            document.body.appendChild(link);
            link.click();
            link.remove();
          }
          document.querySelectorAll(".js-download").forEach(button=>button.addEventListener("click",()=>downloadCV(button)));'''

          pattern = r'const LEGACY_URL=.*?document\.querySelectorAll\("\.js-download"\)\.forEach\(button=>button\.addEventListener\("click",\(\)=>downloadCV\(button\)\)\);'
          text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
          if count != 1:
              raise RuntimeError('Could not find the legacy image/PDF asset block in index.html')

          checks = [
              'f58bd69b-a414-46d6-858a-8eb59e659121-1_all_35799.jpg',
              'HV JUAN DAVID ESCOBAR 2026-es.pdf',
              'CV-Juan-David-Escobar-ES.pdf',
          ]
          for filename in checks:
              if not Path(filename).exists():
                  raise RuntimeError(f'Missing uploaded file: {filename}')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Connect uploaded portrait and CV PDF files"
          git push
