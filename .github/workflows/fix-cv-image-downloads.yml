name: Fix CV image and downloads

on:
  push:
    paths:
      - '.github/workflows/fix-cv-image-downloads.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-site:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Improve portrait and two-page CV downloads
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          # Improve the existing embedded suit portrait without depending on external assets.
          portrait_css = '''
          /* Portrait refinement: tighter professional crop, no stretching, stable mobile rendering */
          .portrait{aspect-ratio:4/5.15!important;background:#d9cab1!important}
          .portrait img{width:100%!important;height:100%!important;object-fit:cover!important;object-position:center 42%!important;transform:scale(1.085);transform-origin:center 42%;filter:saturate(.96) contrast(1.025)}
          @media(max-width:620px){.portrait img{object-position:center 40%!important;transform:scale(1.06)}}
          .cv-note{margin:14px 0 0;color:rgba(255,255,255,.54);font-size:.72rem}
          '''
          if 'Portrait refinement: tighter professional crop' not in text:
              text = text.replace('</style>', portrait_css + '\n</style>', 1)

          # Make labels explicit: the embedded files are the official two-page ES/EN documents.
          text = text.replace(
              'data-i18n-es="Descargar CV" data-i18n-en="Download CV">Descargar CV</button>',
              'data-i18n-es="Descargar HV" data-i18n-en="Download CV">Descargar HV</button>',
              1
          )
          text = text.replace(
              '<span data-i18n-es="Descargar CV" data-i18n-en="Download CV">Descargar CV</span> ↓',
              '<span data-i18n-es="Descargar HV (PDF · 2 páginas)" data-i18n-en="Download CV (PDF · 2 pages)">Descargar HV (PDF · 2 páginas)</span> ↓',
              1
          )

          # Add a short format note once.
          if 'Documento profesional de 2 páginas' not in text:
              marker = '      <div class="hero-meta">'
              note = '      <p class="cv-note" data-i18n-es="Documento profesional de 2 páginas · disponible en español e inglés" data-i18n-en="Two-page professional resume · available in Spanish and English">Documento profesional de 2 páginas · disponible en español e inglés</p>\n'
              text = text.replace(marker, note + marker, 1)

          # Replace the download handler with a more robust Blob download while preserving
          # the existing embedded official PDFs in const pdfs.
          new_function = r'''function downloadCV(){
            try{
              const encoded=(pdfs[currentLang]||"").replace(/\s/g,"");
              if(!encoded) throw new Error("PDF unavailable");
              const raw=atob(encoded);
              const bytes=new Uint8Array(raw.length);
              for(let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
              const blob=new Blob([bytes],{type:"application/pdf"});
              const url=URL.createObjectURL(blob);
              const a=document.createElement("a");
              a.href=url;
              a.download=currentLang==="es"?"HV-Juan-David-Escobar-ES-2-paginas.pdf":"CV-Juan-David-Escobar-EN-2-pages.pdf";
              a.rel="noopener";
              document.body.appendChild(a);
              a.click();
              a.remove();
              window.setTimeout(()=>URL.revokeObjectURL(url),5000);
            }catch(error){
              console.error(error);
              alert(currentLang==="es"?"No fue posible descargar la hoja de vida. Inténtalo de nuevo.":"The CV could not be downloaded. Please try again.");
            }
          }'''
          text, count = re.subn(
              r'function downloadCV\(\)\{.*?\n\}',
              lambda _: new_function,
              text,
              count=1,
              flags=re.S
          )
          if count != 1:
              raise RuntimeError('Could not locate downloadCV() in index.html')

          # Basic integrity checks before committing.
          if 'const pdfs={' not in text or 'es:"' not in text or 'en:"' not in text:
              raise RuntimeError('Embedded Spanish/English PDFs were not found')
          if 'HV-Juan-David-Escobar-ES-2-paginas.pdf' not in text:
              raise RuntimeError('New download handler was not written')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Improve CV portrait and two-page PDF downloads"
          git push
